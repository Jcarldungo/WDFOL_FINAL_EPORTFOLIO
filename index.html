<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <!-- ============================================================
       META & SEO
  ============================================================ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"        content="Jann Carl Dungo (jcdungoo20) — Backend Developer & BSIT Student at Holy Angel University. Building efficient backend systems with Node.js, PHP, and REST APIs." />
  <meta name="keywords"           content="Jann Carl Dungo, jcdungoo20, backend developer, BSIT, Holy Angel University, Node.js, PHP, MySQL, MongoDB, REST API, web development, Pampanga" />
  <meta name="author"             content="Jann Carl Dungo" />
  <meta name="theme-color"        content="#080c14" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Jann Carl Dungo | Backend Developer & BSIT Student" />
  <meta property="og:description" content="Building structured, efficient backend systems with Node.js, PHP, and RESTful APIs." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://jcdungoo20.github.io" />

  <!-- Twitter Card -->
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="Jann Carl Dungo | Backend Developer" />
  <meta name="twitter:description" content="BSIT student at Holy Angel University. Node.js, PHP, MySQL, MongoDB." />

  <title>Jann Carl Dungo | Backend Developer</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/logo.png" />
  <link rel="apple-touch-icon" href="assets/icons/logo.png" />

  <!-- ============================================================
       FONTS — Preconnect for performance, then font request
       Syne       → display / headings
       DM Sans    → body text
       JetBrains  → code / monospaced UI elements
  ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <!-- ============================================================
       STYLES — Single entry point; all @imports handled in main.css
  ============================================================ -->
  <link rel="stylesheet" href="css/main.css" />

  <!-- EmailJS SDK -->
   <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
      emailjs.init({ publicKey: "LwJqauSQo1Xu0WEHk" });
    })();
  </script>
 
</head>

<body>

  <!-- Skip to main content (accessibility) -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!--
    ================================================================
    APP SHELL — This file is intentionally minimal.
    All layout components (navbar, footer) are injected by loader.js.
    All page content is fetched and injected by router.js.
    No inline CSS or JavaScript lives here.
    ================================================================
  -->

  <!-- ── Ambient background effects (pure CSS, no JS needed) ── -->
  <div class="blob-wrap" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- ── Particle canvas (initialized by js/modules/particles.js) ── -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- ── Navbar placeholder (filled by js/modules/loader.js) ── -->
  <div id="navbar-placeholder"></div>

  <!-- ── Main content (filled by js/modules/router.js) ─────── -->
  <main id="main-content" role="main" aria-live="polite" aria-label="Page content">
    <!-- Page fragments are dynamically injected here -->
    <div class="page-loading" aria-label="Loading"></div>
  </main>

  <!-- ── Footer placeholder (filled by js/modules/loader.js) ── -->
  <div id="footer-placeholder"></div>

  <!-- ============================================================
       SCRIPTS — ES6 module entry point. type="module" gives us:
       - Automatic deferred execution (no need for defer attribute)
       - Native import/export support
       - Strict mode by default
       - Module scope (no global namespace pollution)
  ============================================================ -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
